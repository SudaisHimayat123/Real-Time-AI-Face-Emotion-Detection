# ============================================================
# AI Face Emotion Overlay — Docker Compose
# Run entire stack with: docker-compose up
# ============================================================

version: "3.9"

services:
  backend:
    build: .
    container_name: emotion_overlay_backend
    ports:
      - "8000:8000"
    volumes:
      - ./outputs:/app/outputs
      - ./ai_models:/app/ai_models
      - ./assets:/app/assets
      - ./configs:/app/configs
    environment:
      - APP_ENV=production
      - API_HOST=0.0.0.0
      - API_PORT=8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Optional: Nginx reverse proxy for production
  # nginx:
  #   image: nginx:alpine
  #   container_name: emotion_overlay_nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./configs/nginx.conf:/etc/nginx/nginx.conf
  #     - ./frontend/dist:/usr/share/nginx/html
  #   depends_on:
  #     - backend
  #   restart: unless-stopped

volumes:
  outputs:
